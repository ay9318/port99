<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Memory Game</title>
    <style>
        @font-face { 
            font-family: 'GmarketSansMedium'; 
            src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_2001@1.1/GmarketSansMedium.woff') format('woff'); 
            font-weight: normal; 
            font-style: normal; 
        }

        * {margin: 0; padding: 0;}

        .title {width: 100%; text-align: center; margin-top: 1%; font-size: 50px; font-family: 'GmarketSansMedium';}
        main {            
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: center;
            width: 100%;
            max-width: 900px;
            margin: 3% auto;
            background: #6D5017;
            padding: 5%;
        }
        main .card {
            position: relative;
            width: 120px; height: 150px;
            margin: 1%; perspective: 1000px;
        }
        .card > div {
            transform-style: preserve-3d;
        }
        main .card .front {
            position: relative;
            z-index: 10;
            width: 100%; height: 100%;
            background: url(img/front.jpg);
            background-size: cover;            
            transform: rotateY(0deg);
            transition: transform 1s;
            backface-visibility: hidden;
        }
        main .card .back {
            width: 100%; height: 100%;
            position: absolute; left: 0; top: 0;
            transform: rotateY(-180deg);
            transition: transform 1s;
            backface-visibility: hidden;
        }
        main .card:hover .front {
            transform: rotateY(-180deg);
            transition: transform 1s;
        }
        main .card:hover .back {
            transform: rotateY(0deg);
            transition: transform 1s;
        }

        [data-type="img1"] .back {
            background: url(img/img01.jpg);
            background-size: cover;
        }
        [data-type="img2"] .back {
            background: url(img/img02.jpg);
            background-size: cover;
        }

            background-size: cover;
        }           
        [data-type="img9"] .back {
            background: url(img/img09.jpg);
            background-size: cover;
        }           
    </style>
</head>
