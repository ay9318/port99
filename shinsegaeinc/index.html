<!DOCTYPE html>
<html lang="ko">
<head>
	<meta charset="UTF-8">
	<meta http-equiv="X-UA-Compatible" content="IE=edge">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>신세계아이앤씨</title>
	
	<link rel="stylesheet" href="/shinsegaeinc/assets/css/reset.css">
	<link rel="stylesheet" href="/shinsegaeinc/assets/css/style.css">
	<link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
</head>
<body>
	<div id="wrap">
		<header class="header clearfix">
			<h1 class="logo">
				<a href="index.html"><img src="/shinsegaeinc/assets/images/common/logo_sinc.png" alt=""></a>
			</h1>
			<ul class="gnb">
				<li><a href="#none">COMPANY</a></li>
				<li><a href="#none">BUSINESS</a></li>
				<li><a href="#none">NEWS</a></li>
				<li><a href="#none">CSR</a></li>
			</ul>
			<ul class="sub_nav">
				<li>
					<select>
						<option value="KR">KR</option>
						<option value="EN">EN</option>
					</select>
				</li>
				<li><a href="#none">CONTACT US</a></li>
				<li class="search"><a href="#none"><img src="/shinsegaeinc/assets/images/common/ico_search.png" alt="검색"></a></li>
			</ul>
		</header>
		<sectio id="intro">
			<div class="text_wrap">
				<div class="text">
					<p>GLOBAL</p>
					<p>RETAIL TECH</p>
					<p>LEADER</p>
				</div>
				<div class="btn_wrap">
					<button type="button" class="plus"></button>
				</div>
			</div>			
			<div class="bar_wrap">
				<div class="bar"></div>
			</div>
		</sectio>
	</div>
	<script src="/shinsegaeinc/assets/js/jquery-1.8.3.min.js"></script>
	<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.6.0/gsap.min.js"></script>
	<script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
	<script>
		AOS.init();
		
		$(function(){
			//글자 쪼개기
			$("#intro .text_wrap p").each(function(){
				let txt = $(this).text();
				let split = txt.split("").join("</span><span aria-hidden='true'>");

				split = "<span aria-hidden='true'>" + split + "</span>"
				$(this).html(split).attr("aria-lable", txt);
			});

			//인트로 애니메이션		
			gsap.to("#intro .text_wrap p span", {opacity: 1, duration: 1.2, stagger: 0.03});
			gsap.to("#intro .text_wrap .btn_wrap", {opacity: 1, duration: .8, delay: 1.2, bottom: "-10px"});
			//gsap.to("#intro .text_wrap .bar_wrap bar", {opacity: 1, width: "100%", duration: .8, delay: 1.2});

			$(window).scroll(function(){
				gsap.to("#intro .text_wrap .bar_wrap .bar", {opacity: 0, width: "0%"});
			})
		});
	</script>
</body>
</html>
